# ruff — linter config for basketball-clipper backend
# https://docs.astral.sh/ruff/configuration/

target-version = "py311"
line-length = 99

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]

ignore = [
    "E501",   # line too long (handled by formatter, not linter)
    "B008",   # do not perform function calls in default arguments (FastAPI Depends)
    "SIM108", # ternary vs if-else — style preference
]

[lint.per-file-ignores]
"tests/*" = ["S101"]  # assert allowed in tests
