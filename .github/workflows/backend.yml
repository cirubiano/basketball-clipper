name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt ruff

      - name: Lint with ruff
        working-directory: backend
        run: ruff check .

      - name: Run tests
        working-directory: backend
        env:
          # All external services are mocked in tests — these values are
          # placeholders so Pydantic Settings doesn't fall back to a missing .env
          ANTHROPIC_API_KEY: test-placeholder
          AWS_ACCESS_KEY_ID: test-placeholder
          AWS_SECRET_ACCESS_KEY: test-placeholder
          DATABASE_URL: "postgresql+asyncpg://basketball:basketball@localhost:5432/basketball_clipper"
          REDIS_URL: "redis://localhost:6379/0"
          CELERY_BROKER_URL: "redis://localhost:6379/0"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/1"
        run: pytest -v --tb=short
