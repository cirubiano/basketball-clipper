name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt ruff

      - name: Syntax check (py_compile)
        working-directory: backend
        run: |
          python -m py_compile \
            app/main.py \
            app/core/security.py \
            app/core/config.py \
            app/core/database.py \
            app/models/__init__.py \
            app/models/user.py \
            app/models/club.py \
            app/models/season.py \
            app/models/team.py \
            app/models/club_member.py \
            app/models/profile.py \
            app/models/video.py \
            app/models/clip.py \
            app/models/player.py \
            app/models/drill.py \
            app/models/club_tag.py \
            app/models/catalog.py \
            app/models/playbook.py \
            app/routers/auth.py \
            app/routers/clubs.py \
            app/routers/seasons.py \
            app/routers/teams.py \
            app/routers/profiles.py \
            app/routers/video.py \
            app/routers/clips.py \
            app/routers/drills.py \
            app/routers/catalog.py \
            app/routers/playbook.py \
            app/routers/players.py \
            app/routers/ws.py \
            app/schemas/auth.py \
            app/schemas/club.py \
            app/schemas/video.py \
            app/schemas/clip.py \
            app/schemas/drill.py \
            app/schemas/catalog.py \
            app/schemas/playbook.py \
            app/services/catalog.py \
            app/services/storage.py \
            app/services/detector.py \
            app/services/cutter.py \
            app/services/queue.py

      - name: Lint with ruff
        working-directory: backend
        run: ruff check .

      - name: Check for forbidden patterns in shared/api
        working-directory: ..
        run: |
          if grep -r "apiClient" shared/api/; then
            echo "ERROR: 'apiClient' found in shared/api/ — use apiRequest instead"; exit 1
          fi
          if grep -r "body: {" shared/api/; then
            echo "ERROR: 'body: {' found in shared/api/ — use JSON.stringify()"; exit 1
          fi
          echo "shared/api patterns OK"

      - name: Run tests
        working-directory: backend
        env:
          # All external services are mocked in tests — these values are
          # placeholders so Pydantic Settings doesn't fall back to a missing .env
          ANTHROPIC_API_KEY: test-placeholder
          AWS_ACCESS_KEY_ID: test-placeholder
          AWS_SECRET_ACCESS_KEY: test-placeholder
          DATABASE_URL: "postgresql+asyncpg://basketball:basketball@localhost:5432/basketball_clipper"
          REDIS_URL: "redis://localhost:6379/0"
          CELERY_BROKER_URL: "redis://localhost:6379/0"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/1"
        run: pytest -v --tb=short
