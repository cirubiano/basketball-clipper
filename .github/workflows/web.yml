name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "shared/**"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web/**"
      - "shared/**"
      - ".github/workflows/web.yml"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            shared/package.json
            web/package.json

      - name: Install shared dependencies
        working-directory: shared
        run: npm install

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Type check shared
        working-directory: web
        run: npx tsc --project ../shared/tsconfig.json --noEmit

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Type check web
        working-directory: web
        run: npm run type-check

      - name: Build
        working-directory: web
        env:
          # Placeholder so Next.js doesn't complain about a missing .env
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
